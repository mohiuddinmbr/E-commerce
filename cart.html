<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cart</title>
    <style>

*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, Helvetica, sans-serif;
}

body{
    background: #f4f4f4;
    padding: 30px;
}

h1{
    text-align: center;
    margin-bottom: 30px;
    font-size: 40px;
}

.container{
    width: 90%;
    margin: auto;

    display: flex;
    flex-direction: column;
    gap: 20px;
}

.cart-card{
    background: white;
    padding: 20px;

    border-radius: 15px;

    display: flex;
    justify-content: space-between;
    align-items: center;

    box-shadow: 0 5px 15px rgba(0,0,0,0.1);

    transition: 0.3s;
}

.cart-card:hover{
    transform: translateY(-3px);
}

.left h2{
    margin-bottom: 10px;
}

.category{
    color: gray;
}

.right{
    display: flex;
    flex-direction: column;
    align-items: end;
    gap: 12px;
}

.right h3{
    color: green;
}

.quantity-box{
    display: flex;
    align-items: center;
    gap: 12px;
}

.quantity-box button{
    width: 35px;
    height: 35px;

    border: none;
    border-radius: 8px;

    background: black;
    color: white;

    font-size: 20px;
    cursor: pointer;

    transition: 0.3s;
}

.quantity-box button:hover{
    transform: scale(1.05);
}

.quantity-box span{
    font-size: 18px;
    font-weight: bold;
}

.remove-btn{
    padding: 10px 18px;
    border: none;

    background: crimson;
    color: white;

    border-radius: 8px;

    cursor: pointer;

    transition: 0.3s;
}

.remove-btn:hover{
    background: darkred;
}

.empty{
    text-align: center;
    margin-top: 100px;
}

</style>
</head>
<body>
    <h1>Cart</h1>

    <div class="container">

    </div>



    <script src="./cart.js"></script>
</body>
</html>
