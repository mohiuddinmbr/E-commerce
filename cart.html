<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cart</title>
    <style>
        .cart-card{
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px;
    margin: 15px 0;
    border-radius: 15px;
    background: #1e1e1e;
    color: white;
}

.category{
    color: gray;
    margin-top: 5px;
}

.right{
    text-align: right;
}

.quantity-box{
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 10px;
}

.quantity-box button{
    width: 30px;
    height: 30px;
    border: none;
    border-radius: 8px;
    background: #333;
    color: white;
    font-size: 18px;
    cursor: pointer;
}

.quantity-box span{
    font-size: 18px;
    font-weight: bold;
}

.total-box{
    margin-top: 30px;
    padding: 25px;
    border-radius: 20px;
    background: linear-gradient(135deg, #4f46e5, #7c3aed);
    color: white;

    display: flex;
    justify-content: space-between;
    align-items: center;
}

.total-box p{
    margin-top: 5px;
    opacity: 0.8;
}

.total-box h1{
    font-size: 35px;
}

.nav-link {
    display: inline-block;
    padding: 10px 18px;
    border-radius: 12px;
    text-decoration: none;
    font-size: 16px;
    font-weight: 600;

    color: white;
    background: linear-gradient(135deg, #4f46e5, #7c3aed);

    transition: all 0.3s ease;
    box-shadow: 0 6px 15px rgba(0,0,0,0.2);
}

/* hover effect */
.nav-link:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 20px rgba(0,0,0,0.3);
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
}

/* click effect */
.nav-link:active {
    transform: scale(0.95);
}
    </style>
</head>
<body>
    <a href="./index.html" class="nav-link">Home</a>

    <h1>Cart</h1>

    <div class="container">

    </div>



    <script src="./cart.js"></script>
</body>
</html>
